<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0f172a" id="meta-theme-color">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>شبكتي برو - Shabakaty</title>
    
    <!-- الخطوط والأيقونات -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- JW Player -->
    <script src="https://ssl.p.jwpcdn.com/player/v/8.26.0/jwplayer.js"></script>
    <script>jwplayer.key = "XSuP4qMl+9tK17QNb+4+th2Pm9AWgMO/cYH8CI0HGGr7bdjo";</script>
    
    <style>
        /* ... (جميع الأنماط كما هي دون تغيير) ... */
        :root {
            --bg-main: #0f172a;
            --bg-card: #1e293b;
            --primary: #e50914; 
            --primary-hover: #b8070f;
            --text-light: #f8fafc;
            --text-muted: #94a3b8;
            --glass-bg: rgba(15, 23, 42, 0.85);
            --border-glass: rgba(255, 255, 255, 0.08);
            --safe-bottom: env(safe-area-inset-bottom, 0px);
            --safe-top: env(safe-area-inset-top, 0px);
            --max-width: 1400px;
        }

        body.light-theme {
            --bg-main: #f0f4f8;
            --bg-card: #ffffff;
            --text-light: #0f172a;
            --text-muted: #64748b;
            --glass-bg: rgba(255, 255, 255, 0.9);
            --border-glass: rgba(0, 0, 0, 0.08);
        }

        /* ... (باقي الأنماط كما هي) ... */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Tajawal', sans-serif;
            -webkit-tap-highlight-color: transparent;
            scrollbar-width: thin;
            scrollbar-color: var(--primary) var(--bg-main);
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-light);
            transition: background-color 0.3s ease, color 0.3s ease;
            overflow-x: hidden;
            padding-top: calc(60px + var(--safe-top)); 
            padding-bottom: calc(80px + var(--safe-bottom)); 
            font-size: 16px;
        }

        .app-container {
            max-width: var(--max-width);
            margin: 0 auto;
            position: relative;
            min-height: 100vh;
        }

        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            margin: 0 auto;
            max-width: var(--max-width);
            height: calc(60px + var(--safe-top));
            padding-top: var(--safe-top);
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border-glass);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0 20px;
            z-index: 100;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 22px;
            font-weight: 900;
            color: var(--primary);
            letter-spacing: 0.5px;
            cursor: pointer;
        }

        .view-section {
            display: none;
            animation-duration: 0.4s;
            animation-timing-function: ease;
            animation-fill-mode: forwards;
            padding-top: 15px;
        }
        .view-section.active {
            display: block;
        }

        html[dir="rtl"] .view-section.active {
            animation-name: slideInRight;
        }

        html[dir="ltr"] .view-section.active {
            animation-name: slideInLeft;
        }

        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(50px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes slideInLeft {
            from { opacity: 0; transform: translateX(-50px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .hero-banner {
            width: calc(100% - 40px);
            margin: 0 auto 25px auto;
            height: 350px;
            border-radius: 20px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            cursor: pointer;
            transition: transform 0.3s;
        }
        @media (max-width: 768px) {
            .hero-banner { height: 220px; }
        }
        .hero-banner:hover { transform: scale(1.01); }
        .hero-banner img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .hero-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(15,23,42,1) 0%, rgba(15,23,42,0.4) 50%, transparent 100%);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 30px;
        }
        .hero-badge {
            background: var(--primary);
            color: white;
            font-size: 12px;
            font-weight: 900;
            padding: 4px 10px;
            border-radius: 6px;
            width: fit-content;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .hero-title {
            color: white;
            font-size: 32px;
            font-weight: 900;
            margin-bottom: 10px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }
        @media (max-width: 768px) { .hero-title { font-size: 24px; } }
        .hero-desc {
            color: rgba(255,255,255,0.8);
            font-size: 15px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            margin-bottom: 15px;
            max-width: 600px;
        }
        .hero-play-btn {
            background: var(--primary);
            color: white;
            padding: 10px 24px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
            width: fit-content;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(229,9,20,0.4);
        }
        .hero-play-btn:hover { background: var(--primary-hover); transform: scale(1.05); }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            margin-bottom: 15px;
            margin-top: 10px;
        }
        .section-title { 
            font-size: 20px; 
            font-weight: 900; 
            border-inline-start: 4px solid var(--primary); 
            padding-inline-start: 12px; 
            line-height: 1; 
        }
        .see-all { 
            color: var(--text-muted); 
            font-size: 15px; 
            font-weight: 700; 
            cursor: pointer; 
            display: flex;
            align-items: center;
            gap: 5px;
            transition: 0.2s;
        }
        .see-all:hover { color: var(--primary); }

        .horizontal-scroll {
            display: flex;
            overflow-x: auto;
            gap: 20px;
            padding: 0 20px 20px 20px;
            scroll-behavior: smooth;
            scroll-snap-type: x mandatory;
        }

        .card {
            width: 240px; 
            aspect-ratio: 16 / 9;
            border-radius: 12px;
            position: relative;
            flex-shrink: 0;
            scroll-snap-align: start;
            cursor: pointer;
            overflow: hidden;
            background-color: var(--bg-card);
            box-shadow: 0 6px 15px rgba(0,0,0,0.2);
            border: 1px solid var(--border-glass);
            transition: box-shadow 0.3s ease;
        }
        @media (max-width: 768px) { .card { width: 180px; } }
        
        .card:hover { box-shadow: 0 10px 25px rgba(0,0,0,0.4); }

        .card::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 70%;
            background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.2) 70%, transparent 100%);
            pointer-events: none;
            z-index: 1;
        }

        .card img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s; }
        .card:hover img { transform: scale(1.1); }

        .card-info {
            position: absolute;
            bottom: 12px;
            right: 15px;
            left: 15px;
            z-index: 5;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            gap: 10px;
        }

        .card-name {
            color: #ffffff;
            font-weight: 700;
            font-size: 15px; 
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }

        .card-badge {
            background: rgba(0,0,0,0.7);
            color: white;
            font-size: 10px;
            padding: 4px 8px;
            border-radius: 6px;
            font-weight: 900;
            letter-spacing: 0.5px;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .card-badge.live-badge {
            background: var(--primary);
            border-color: var(--primary);
            animation: pulseLive 1.5s infinite;
        }

        @keyframes pulseLive {
            0% { box-shadow: 0 0 0 0 rgba(229, 9, 20, 0.7); }
            70% { box-shadow: 0 0 0 8px rgba(229, 9, 20, 0); }
            100% { box-shadow: 0 0 0 0 rgba(229, 9, 20, 0); }
        }

        .fav-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 35px;
            height: 35px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(5px);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 16px;
            z-index: 10;
            transition: all 0.3s ease;
            border: 1px solid rgba(255,255,255,0.2);
        }
        [dir="ltr"] .fav-btn { right: auto; left: 10px; }
        .fav-btn:hover { background: rgba(0,0,0,0.9); transform: scale(1.1); }
        .fav-btn.active { color: var(--primary); background: rgba(255,255,255,0.95); }

        @media (max-width: 768px) {
            .fav-btn {
                width: 30px;
                height: 30px;
                font-size: 14px;
                background: rgba(0,0,0,0.5);
                backdrop-filter: blur(2px);
                top: 6px;
                right: 6px;
            }
            [dir="ltr"] .fav-btn {
                right: auto;
                left: 6px;
            }
        }

        .play-icon {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.5);
            width: 50px;
            height: 50px;
            background: rgba(229, 9, 20, 0.9);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 20px;
            z-index: 5;
            opacity: 0;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 0 20px rgba(229, 9, 20, 0.6);
            direction: ltr; 
        }
        .play-icon i { margin-left: 4px; }
        .card:hover .play-icon { opacity: 1; transform: translate(-50%, -50%) scale(1); }

        .list-layout {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            padding: 0 20px 20px 20px;
        }

        @media (max-width: 768px) {
            .list-layout {
                grid-template-columns: 1fr;
            }
        }

        .list-layout .card {
            width: 100%;
        }

        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: var(--text-muted);
            grid-column: 1 / -1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }
        .empty-state i { font-size: 70px; opacity: 0.2; margin-bottom: 10px; }
        .empty-state h3 { font-size: 22px; color: var(--text-light); }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        
        .bottom-sheet {
            width: 100%;
            max-width: 600px;
            background: var(--bg-card);
            border-radius: 24px;
            z-index: 1001;
            transform: translateY(50px) scale(0.9);
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            max-height: 90vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid var(--border-glass);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        @media (max-width: 768px) {
            .modal-overlay { align-items: flex-end; }
            .bottom-sheet { border-radius: 24px 24px 0 0; transform: translateY(100%); border-bottom: none; }
            .modal-overlay.active .bottom-sheet { transform: translateY(0); }
        }
        .modal-overlay.active .bottom-sheet { transform: translateY(0) scale(1); }
        
        .sheet-close-top {
            position: absolute;
            top: 15px;
            left: 15px;
            background: rgba(0,0,0,0.5);
            color: white;
            border: none;
            width: 35px; height: 35px;
            border-radius: 50%;
            cursor: pointer;
            z-index: 10;
            display: flex; justify-content: center; align-items: center;
        }
        [dir="ltr"] .sheet-close-top { left: auto; right: 15px; }

        .sheet-content { padding: 0 0 30px; overflow-y: auto; }
        .sheet-image {
            width: 100%;
            height: 250px;
            object-fit: cover;
            box-shadow: inset 0 -30px 30px rgba(0,0,0,0.5);
        }
        .sheet-details { padding: 20px; }
        .sheet-header-info { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 15px; }
        .sheet-title { font-size: 26px; font-weight: 900; color: var(--text-light); margin-bottom: 8px;}
        .sheet-meta { display: flex; gap: 10px; font-size: 13px; color: var(--text-muted); font-weight: 700;}
        .sheet-meta span { background: var(--bg-main); padding: 5px 10px; border-radius: 8px; border: 1px solid var(--border-glass);}
        
        .sheet-desc { font-size: 15px; color: var(--text-muted); line-height: 1.7; margin-bottom: 25px; }
        
        .sheet-actions { display: flex; gap: 15px; }
        .btn-play {
            flex: 1;
            background: var(--primary);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 16px;
            font-size: 18px;
            font-weight: 900;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 4px 15px rgba(229,9,20,0.3);
        }
        .btn-play:hover { transform: translateY(-2px); background: var(--primary-hover); }
        .btn-fav-large {
            width: 60px;
            background: var(--bg-main);
            color: var(--text-light);
            border: 1px solid var(--border-glass);
            border-radius: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 22px;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-fav-large.active { color: var(--primary); border-color: var(--primary); }
        .btn-fav-large:hover { background: var(--border-glass); }

        .video-player-wrapper {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 99999;
            display: none;
            flex-direction: column;
            animation: fadeInPlayer 0.3s ease;
        }
        .video-player-wrapper.active { display: flex; }
        @keyframes fadeInPlayer {
            from { opacity: 0; transform: scale(0.98); }
            to { opacity: 1; transform: scale(1); }
        }

        .player-top-controls {
            position: absolute;
            top: 0; left: 0; width: 100%;
            padding: 20px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
            color: white;
            transition: opacity 0.3s;
        }
        .player-top-controls h2 { font-size: 18px; font-weight: 700; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        .close-player-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            width: 40px; height: 40px;
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
            backdrop-filter: blur(5px);
            transition: 0.3s;
        }
        .close-player-btn:hover { background: var(--primary); transform: rotate(90deg); }

        .jwplayer-container {
            flex: 1;
            width: 100%;
            height: 100%;
            background: #000;
            position: relative;
        }
        #jwplayerDiv {
            width: 100% !important;
            height: 100% !important;
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            max-width: var(--max-width);
            margin: 0 auto;
            width: 100%;
            height: calc(70px + var(--safe-bottom));
            padding-bottom: var(--safe-bottom);
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid var(--border-glass);
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 100;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
            color: var(--text-muted);
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            width: 70px;
            height: 100%;
        }
        .nav-item i { font-size: 22px; transition: 0.3s; }
        .nav-item:hover { color: var(--text-light); }
        .nav-item.active { color: var(--primary); }
        .nav-item.active i { transform: translateY(-5px) scale(1.1); }

        .settings-list { padding: 0 20px; max-width: 800px; margin: 0 auto;}
        .setting-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background: var(--bg-card);
            border-radius: 16px;
            margin-bottom: 15px;
            border: 1px solid var(--border-glass);
            font-weight: 700;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: 0.3s;
        }
        .setting-item:hover { border-color: rgba(255,255,255,0.2); }
        .setting-item-left { display: flex; align-items: center; gap: 15px; font-size: 18px;}
        .setting-item i.icon-main { width: 24px; text-align: center; font-size: 22px;}
        
        .switch { position: relative; display: inline-block; width: 54px; height: 30px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #475569; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 22px; width: 22px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--primary); }
        input:checked + .slider:before { transform: translateX(24px); }
        [dir="ltr"] .slider:before { left: 4px; right: auto; }
        [dir="ltr"] input:checked + .slider:before { transform: translateX(24px); }

        .lang-toggle { display: flex; background: var(--bg-main); border-radius: 20px; padding: 5px; border: 1px solid var(--border-glass); direction: ltr; }
        .lang-btn { background: transparent; color: var(--text-muted); border: none; padding: 8px 20px; border-radius: 16px; font-size: 15px; font-weight: 900; cursor: pointer; transition: all 0.3s; }
        .lang-btn.active { background: var(--primary); color: white; box-shadow: 0 2px 10px rgba(229, 9, 20, 0.4); }

        .back-btn { background: transparent; border: none; color: var(--text-light); font-size: 20px; display: flex; align-items: center; gap: 10px; cursor: pointer; transition: 0.2s;}
        .back-btn:hover { color: var(--primary); }

        .toast-container {
            position: fixed;
            bottom: calc(90px + var(--safe-bottom));
            left: 50%;
            transform: translateX(-50%);
            background: var(--primary);
            color: white;
            padding: 14px 28px;
            border-radius: 30px;
            font-size: 15px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 9999;
            opacity: 0;
            pointer-events: none;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 20px rgba(229,9,20,0.4);
            white-space: nowrap;
        }
        .toast-container.show { opacity: 1; transform: translateX(-50%) translateY(-20px); }

        .skeleton {
            background: linear-gradient(90deg, var(--bg-card) 25%, var(--bg-main) 50%, var(--bg-card) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 16px;
        }
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
        .loading-view { display: none; padding: 20px; }
        .loading-view.active { display: block; }
    </style>
</head>
<body>

<div class="app-container">
    
    <header class="top-bar" id="top-bar">
        <div class="logo-container" onclick="document.querySelector('.nav-item[data-target=\'view-home\']').click()">
            <i class="fas fa-play-circle"></i>
            <span data-i18n="appTitle">شبكتي برو</span>
        </div>
    </header>

    <!-- شاشة التحميل -->
    <div id="loading-screen" class="loading-view active">
        <div class="skeleton" style="height: 350px; width: 100%; margin-bottom: 30px;"></div>
        <div class="skeleton" style="height: 25px; width: 30%; margin-bottom: 20px;"></div>
        <div style="display: flex; gap: 20px; overflow: hidden; margin-bottom: 40px;">
            <div class="skeleton" style="height: 140px; min-width: 240px;"></div>
            <div class="skeleton" style="height: 140px; min-width: 240px;"></div>
            <div class="skeleton" style="height: 140px; min-width: 240px;"></div>
        </div>
    </div>

    <!-- الصفحات -->
    <main id="view-home" class="view-section"></main>

    <main id="view-favorites" class="view-section">
        <div class="section-header">
            <div class="section-title" data-i18n="favorites">قناتي المفضلة</div>
        </div>
        <div class="list-layout" id="favorites-container"></div>
    </main>

            case 'worldcup': return t.worldCup;
            case 'global': return t.globalSports;
            default: return cat;

        return `

                    ${heroItem.badge ? `<div class="hero-badge ${heroItem.badge === 'LIVE' ? 'live-badge' : ''}">${heroItem.badge}</div>` : ''}

                    <div class="hero-play-btn"><i class="fas fa-play"></i> ${translations[currentLang].playNow}</div>
                </div>
            </div>`;
        }

        const t = translations[currentLang];
        const chevronIcon = currentLang === 'ar' ? 'fa-chevron-left' : 'fa-chevron-right';

        const sections = [
            { key: 'saudi', title: t.saudiLeague },
            { key: 'english', title: t.englishLeague },
            { key: 'worldcup', title: t.worldCup },
            { key: 'global', title: t.globalSports }
        ];

        sections.forEach(section => {
            const items = appData.filter(d => d.category === section.key);
            if (items.length > 0) {
                html += `
                <div class="section-header">
                    <div class="section-title">${section.title}</div>
                    <div class="see-all" data-category="${section.key}">${t.seeAll} <i class="fas ${chevronIcon}"></i></div>
                </div>
                <div class="horizontal-scroll">${items.map(item => getCardHTML(item)).join('')}</div>`;

        });

        homeContainer.innerHTML = html;
    }

                    <h3>${t.noFavs}</h3>
                    <p style="font-size:15px;">${t.addFavsText}</p>

            container.innerHTML = favItems.map(item => getCardHTML(item)).join('');
        }
    }

        if(selectedItem.badge) {
            badgeEl.textContent = selectedItem.badge;
            badgeEl.style.color = selectedItem.badge === 'LIVE' ? 'var(--primary)' : 'var(--text-light)';
        }

        const favBtn = document.getElementById('modal-fav-btn');
        favBtn.onclick = (e) => toggleFav(e, selectedItem.id);
        const isFav = favoriteIds.includes(selectedItem.id);
        favBtn.className = `btn-fav-large ${isFav ? 'active' : ''}`;
        favBtn.innerHTML = `<i class="${isFav ? 'fas' : 'far'} fa-heart"></i>`;

        modalOverlay.classList.add('active');
    }

    function closeModal() { modalOverlay.classList.remove('active'); }
    modalOverlay.addEventListener('click', (e) => { if(e.target === modalOverlay) closeModal(); });

    function toggleFav(e, id) {
        e.stopPropagation();
        const t = translations[currentLang];
        if (favoriteIds.includes(id)) {
            favoriteIds = favoriteIds.filter(fId => fId !== id);
            showToast(t.removedFav, 'fa-info-circle');
        } else {
            favoriteIds.push(id);
            showToast(t.addedFav, 'fa-check');
        }
        localStorage.setItem('shabakaty_favs', JSON.stringify(favoriteIds));
        
        document.querySelectorAll(`.fav-btn[data-id="${id}"]`).forEach(btn => {
            const isFav = favoriteIds.includes(id);
            btn.className = `fav-btn ${isFav ? 'active' : ''}`;
            btn.innerHTML = `<i class="${isFav ? 'fas' : 'far'} fa-heart"></i>`;
        });
        
        if(selectedItem && selectedItem.id === id) {
            const isFav = favoriteIds.includes(id);
            document.getElementById('modal-fav-btn').className = `btn-fav-large ${isFav ? 'active' : ''}`;
            document.getElementById('modal-fav-btn').innerHTML = `<i class="${isFav ? 'fas' : 'far'} fa-heart"></i>`;
        }

        if (document.getElementById('view-favorites').classList.contains('active')) renderFavorites();
    }

    // --- 5. مشغل JW Player ---
    const videoPlayerWrapper = document.getElementById('video-player-wrapper');
    const jwplayerDiv = 'jwplayerDiv';
    let player = null; // JW Player instance

    // دالة مساعدة لتحويل hex إلى base64
    function hexToBase64(hex) {
        // إزالة أي شرطات أو مسافات
        hex = hex.replace(/[^a-fA-F0-9]/g, '');
        if (hex.length % 2 !== 0) hex = '0' + hex;
        const bytes = new Uint8Array(hex.length / 2);
        for (let i = 0; i < hex.length; i += 2) {
            bytes[i/2] = parseInt(hex.substr(i, 2), 16);
        }
        // استخدام btoa مع تحويل البايتات إلى سلسلة
        return btoa(String.fromCharCode.apply(null, bytes));
    }

    async function lockLandscape() {
        try {
            if (screen.orientation && screen.orientation.lock) {
                await screen.orientation.lock('landscape');
            }
        } catch (e) {
            console.log('لا يمكن قفل الاتجاه:', e);
        }
    }

    function destroyPlayer() {
        if (player && player.remove) {
            player.remove();
            player = null;
        }
        document.getElementById(jwplayerDiv).innerHTML = '';
    }

    function openPlayer() {
        if (!selectedItem) return;
        closeModal();

        // التحقق من mixed content إذا كانت الصفحة https والرابط http
        if (window.location.protocol === 'https:' && selectedItem.streamUrl.startsWith('http:')) {
            showToast('لا يمكن تشغيل رابط http عبر https', 'fa-exclamation-triangle');
            return;
        }

        document.getElementById('playing-title').textContent = getTitle(selectedItem);
        videoPlayerWrapper.classList.add('active');
        lockLandscape();

        destroyPlayer();

        const url = selectedItem.streamUrl;
        
        let playerConfig = {
            file: url,
            width: "100%",
            height: "100%",
            autostart: true,
            mute: false,
            volume: 100,
            stretching: "uniform",
            playbackRateControls: true,
            playbackRates: [0.5, 1, 1.25, 1.5, 2]
        };

        // إعدادات DRM
        if (selectedItem.licenseServer) {
            playerConfig.drm = {
                clearkey: {
                    licenseUrl: selectedItem.licenseServer
                }
            };
        } else if (selectedItem.clearkey) {
            // تحويل المفاتيح من hex إلى base64
            const keyIdBase64 = hexToBase64(selectedItem.clearkey.kid);
            const keyBase64 = hexToBase64(selectedItem.clearkey.k);
            playerConfig.drm = {
                clearkey: {
                    keyId: keyIdBase64,
                    key: keyBase64
                }
            };
        }

        // محاولة ضبط User-Agent لروابط HLS (قد لا تعمل في بعض المتصفحات)
        playerConfig.hlsjsConfig = {
            xhrSetup: function(xhr, url) {
                try {
                    xhr.setRequestHeader("User-Agent", "ExoPlayer");
                    // يمكن إضافة رؤوس أخرى إذا لزم الأمر
                    xhr.setRequestHeader("X-Requested-With", "Shabakaty");
                } catch (e) {
                    console.warn("Browser blocked header modification.");
                }
            }
        };

        try {
            player = jwplayer(jwplayerDiv).setup(playerConfig);
            
            player.on('ready', function() {
                player.setMute(false);
                player.setVolume(100);
            });

            // إعادة التشغيل إذا توقف (للبث المباشر)
            player.on('pause', function() {
                player.play();
            });

            player.on('error', function(error) {
                console.error('JW Player error:', error);
                let errorMsg = 'فشل تشغيل الفيديو';
                if (error.message.includes('DRM') || error.message.includes('License')) {
                    errorMsg = 'مشكلة في منح الدخول للمحتوى المحمي';
                } else if (error.message.includes('Network')) {
                    errorMsg = 'مشكلة في الشبكة - تحقق من اتصالك';
                }
                showToast(errorMsg, 'fa-exclamation-triangle');
                // إغلاق المشغل بعد 3 ثوانٍ من الخطأ
                setTimeout(() => {
                    if (videoPlayerWrapper.classList.contains('active')) {
                        closePlayer();
                    }
                }, 3000);
            });

        } catch (e) {
            console.error('خطأ في إنشاء JW Player:', e);
            showToast('تعذر تشغيل الفيديو', 'fa-exclamation-triangle');
        }
    }

    function closePlayer() {
        if (player) {
            player.stop();
            player.remove();
            player = null;
        }
        videoPlayerWrapper.classList.remove('active');
        document.getElementById(jwplayerDiv).innerHTML = '';
        if (screen.orientation && screen.orientation.unlock) {
            screen.orientation.unlock();
        }
    }

    // --- 6. الإعدادات واللغة والسمات والتنقل ---
    function updateLanguageUI() {
        document.documentElement.lang = currentLang;
        document.documentElement.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
        document.getElementById('back-icon').className = currentLang === 'ar' ? 'fas fa-arrow-right' : 'fas fa-arrow-left';
        document.querySelectorAll('[data-i18n]').forEach(el => {
            const key = el.getAttribute('data-i18n');
            if (translations[currentLang][key]) {
                const icon = el.querySelector('i');
                if (icon) {
                    el.innerHTML = icon.outerHTML + ' ' + translations[currentLang][key];
                } else {
                    el.textContent = translations[currentLang][key];
                }
            }
        });
        document.querySelectorAll('.lang-btn').forEach(btn => {
            if(btn.getAttribute('data-lang') === currentLang) btn.classList.add('active');
            else btn.classList.remove('active');
        });
        renderHome();
        if(document.getElementById('view-favorites').classList.contains('active')) renderFavorites();
    }

    document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
            const selectedLang = e.target.getAttribute('data-lang');
            if(currentLang !== selectedLang) {
                currentLang = selectedLang;
                localStorage.setItem('shabakaty_lang', currentLang);
                updateLanguageUI();
            }
        });
    });

    const themeToggle = document.getElementById('theme-toggle');
    function applyTheme(isLight) {
        if (isLight) {
            document.body.classList.add('light-theme');
            themeToggle.checked = true;
            document.getElementById('meta-theme-color').content = "#f0f4f8";
        } else {
            document.body.classList.remove('light-theme');
            themeToggle.checked = false;
            document.getElementById('meta-theme-color').content = "#0f172a";
        }
    }
    themeToggle.addEventListener('change', () => {
        applyTheme(themeToggle.checked);
        localStorage.setItem('shabakaty_theme', themeToggle.checked ? 'light' : 'dark');
    });

    const views = document.querySelectorAll('.view-section');
    const navItems = document.querySelectorAll('.nav-item');
    function switchView(targetId) {
        views.forEach(view => view.classList.remove('active'));
        document.getElementById(targetId).classList.add('active');
        window.scrollTo(0,0);
        navItems.forEach(nav => {
            if(nav.getAttribute('data-target') === targetId) nav.classList.add('active');
            else nav.classList.remove('active');
        });
    }

    navItems.forEach(item => {
        item.addEventListener('click', () => {
            const targetId = item.getAttribute('data-target');
            switchView(targetId);
            if (targetId === 'view-favorites') renderFavorites();
        });
    });

    document.getElementById('btn-back').addEventListener('click', () => switchView('view-home'));

    document.body.addEventListener('click', (e) => {
        const seeAllBtn = e.target.closest('.see-all');
        if(seeAllBtn) {
            renderSeeAll(seeAllBtn.getAttribute('data-category'));
            switchView('view-see-all');
        }
    });

    let toastTimeout;
    function showToast(message, iconClass) {
        const toast = document.getElementById('toast');
        document.getElementById('toast-msg').textContent = message;
        toast.querySelector('i').className = `fas ${iconClass}`;
        toast.classList.add('show');
        clearTimeout(toastTimeout);
        toastTimeout = setTimeout(() => toast.classList.remove('show'), 2500);
    }

    // --- 7. بدء التشغيل ---
    function initApp() {
        if(localStorage.getItem('shabakaty_theme') === 'light') applyTheme(true);
        updateLanguageUI();
        
        setTimeout(() => {
            document.getElementById('loading-screen').classList.remove('active');
            document.getElementById('view-home').classList.add('active');
            renderHome();
        }, 1000);
    }

    initApp();
</script>
</body>
